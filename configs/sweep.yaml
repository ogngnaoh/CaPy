# CaPy Hyperparameter Sweep Configuration
# wandb sweep format — see https://docs.wandb.ai/guides/sweeps
# See capy-prd-fsd.md Section 8.3 for rationale
#
# Usage:
#   wandb sweep configs/sweep.yaml
#   wandb agent <sweep_id>

program: scripts/train.py
method: grid
project: capy

parameters:
  model.embedding_dim:
    values: [64, 128, 256, 512]

  training.lr_mlp:
    values: [5.0e-4, 1.0e-3, 2.0e-3]

  training.lr_gin:
    values: [5.0e-5, 1.0e-4, 2.0e-4]

  model.temperature_init:
    values: [0.05, 0.07, 0.1]

  training.batch_size:
    values: [128, 256, 512]

  training.lambda_mol_morph:
    values: [0.5, 1.0, 2.0]

  training.lambda_mol_expr:
    values: [0.5, 1.0, 2.0]

  training.lambda_morph_expr:
    values: [0.5, 1.0, 2.0]

command:
  - ${program}
  - "--config"
  - "configs/default.yaml"
  - ${args}
